<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --text: #f0eeff;
      --muted: #6b6b88;
      --overlay: rgba(8,6,18,0.78);
      --font-display: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 4.5rem 2rem 0;
    }
    .header-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.1rem;
    }
    header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, #f0eeff 30%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.8rem;
    }
    header p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 2rem 2.5rem;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.48rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(167,139,250,0.06);
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(167,139,250,0.3);
    }
    .filter-btn .count {
      font-size: 0.68rem;
      font-weight: 700;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 0.08rem 0.45rem;
    }
    .filter-btn.active .count { background: rgba(255,255,255,0.25); }

    /* ── SORT & COUNT ROW ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto 1.25rem;
      padding: 0 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .showing {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }
    .showing strong { color: var(--accent); }

    .sort-select {
      padding: 0.38rem 0.85rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ── GALLERY GRID ── */
    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      columns: 4;
      column-gap: 14px;
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    /* Filter animation */
    .card {
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card.hiding {
      animation: fadeDown 0.25s ease forwards;
    }
    @keyframes fadeDown {
      to { opacity: 0; transform: scale(0.94); }
    }

    .card img {
      width: 100%;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .card:hover img { transform: scale(1.06); }

    /* Overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
    }
    .card:hover .card-overlay { opacity: 1; }

    .card-cat {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: #fff;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .card-actions {
      display: flex;
      gap: 0.4rem;
    }
    .act-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.75rem;
      cursor: pointer;
      display: grid; place-items: center;
      backdrop-filter: blur(4px);
      transition: background 0.18s;
    }
    .act-btn:hover { background: var(--accent); border-color: var(--accent); }
    .act-btn.liked { background: #e05c5c; border-color: #e05c5c; }

    /* Category color dot */
    .cat-dot {
      position: absolute;
      top: 0.7rem; left: 0.7rem;
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.4);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none;
      text-align: center;
      padding: 5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 1.5rem;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      position: relative;
      max-width: 820px;
      width: 100%;
      text-align: center;
    }
    .lb-img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }
    .lb-info {
      margin-top: 1rem;
    }
    .lb-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: #fff;
    }
    .lb-cat {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }
    .lb-close {
      position: absolute;
      top: -42px; right: 0;
      background: none; border: none;
      color: rgba(255,255,255,0.6);
      font-size: 1.8rem;
      cursor: pointer;
      transition: color 0.18s;
      line-height: 1;
    }
    .lb-close:hover { color: var(--accent2); }

    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 44px; height: 44px;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background 0.18s;
      backdrop-filter: blur(6px);
    }
    .lb-nav:hover { background: var(--accent); }
    .lb-prev { left: -56px; }
    .lb-next { right: -56px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { .gallery { columns: 3; } }
    @media (max-width: 720px)  { .gallery { columns: 2; } .lb-prev { left: -38px; } .lb-next { right: -38px; } }
    @media (max-width: 480px)  { .gallery { columns: 2; column-gap: 8px; } .lb-prev,.lb-next { display: none; } }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-tag">📸 Visual Archive</div>
  <h1>Explore the Gallery</h1>
  <p>Filter by category · Hover for details · Click to enlarge</p>
</header>

<!-- Filter bar -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">
    🌐 All <span class="count" id="cnt-all">0</span>
  </button>
  <button class="filter-btn" data-cat="Nature" onclick="setFilter('Nature',this)">
    🌿 Nature <span class="count" id="cnt-Nature">0</span>
  </button>
  <button class="filter-btn" data-cat="City" onclick="setFilter('City',this)">
    🏙️ City <span class="count" id="cnt-City">0</span>
  </button>
  <button class="filter-btn" data-cat="Abstract" onclick="setFilter('Abstract',this)">
    🎨 Abstract <span class="count" id="cnt-Abstract">0</span>
  </button>
  <button class="filter-btn" data-cat="People" onclick="setFilter('People',this)">
    🧑 People <span class="count" id="cnt-People">0</span>
  </button>
  <button class="filter-btn" data-cat="Architecture" onclick="setFilter('Architecture',this)">
    🏛️ Architecture <span class="count" id="cnt-Architecture">0</span>
  </button>
  <button class="filter-btn" data-cat="Ocean" onclick="setFilter('Ocean',this)">
    🌊 Ocean <span class="count" id="cnt-Ocean">0</span>
  </button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <span class="showing">Showing <strong id="showCount">0</strong> photos</span>
  <select class="sort-select" onchange="sortGallery(this.value)">
    <option value="default">Sort: Default</option>
    <option value="az">Sort: A–Z</option>
    <option value="za">Sort: Z–A</option>
  </select>
</div>

<!-- Gallery -->
<div class="gallery" id="gallery"></div>
<div class="empty-state" id="emptyState">
  <div class="icon">🖼️</div>
  <p>No photos in this category yet.</p>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
    <button class="lb-nav lb-next" onclick="lbNav(+1)">›</button>
    <img class="lb-img" id="lbImg" src="" alt=""/>
    <div class="lb-info">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-cat" id="lbCat"></div>
    </div>
  </div>
</div>

<script>
  // ── Data ──
  const photos = [
    { id:1,  title:"Misty Highlands",        cat:"Nature",       img:"https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600", color:"#4ade80" },
    { id:2,  title:"City at Night",           cat:"City",         img:"https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600", color:"#60a5fa" },
    { id:3,  title:"Fluid Colors",            cat:"Abstract",     img:"https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?w=600", color:"#f472b6" },
    { id:4,  title:"Portrait in Light",       cat:"People",       img:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600", color:"#fb923c" },
    { id:5,  title:"Forest Dawn",             cat:"Nature",       img:"https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600", color:"#4ade80" },
    { id:6,  title:"Neon Streets",            cat:"City",         img:"https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600", color:"#60a5fa" },
    { id:7,  title:"Sharp Geometry",          cat:"Abstract",     img:"https://images.unsplash.com/photo-1536431311719-398b6704d4cc?w=600", color:"#f472b6" },
    { id:8,  title:"Ocean Horizon",           cat:"Ocean",        img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600", color:"#38bdf8" },
    { id:9,  title:"Roman Columns",           cat:"Architecture", img:"https://images.unsplash.com/photo-1548013146-72479768bada?w=600", color:"#a78bfa" },
    { id:10, title:"Wild Poppy Field",        cat:"Nature",       img:"https://images.unsplash.com/photo-1490750967868-88df5691cc17?w=600", color:"#4ade80" },
    { id:11, title:"Urban Geometry",          cat:"Architecture", img:"https://images.unsplash.com/photo-1486325212027-8081e485255e?w=600", color:"#a78bfa" },
    { id:12, title:"Candid Laugh",            cat:"People",       img:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=600", color:"#fb923c" },
    { id:13, title:"Turquoise Lagoon",        cat:"Ocean",        img:"https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=600", color:"#38bdf8" },
    { id:14, title:"Bokeh Dreams",            cat:"Abstract",     img:"https://images.unsplash.com/photo-1520034475321-cbe63696469a?w=600", color:"#f472b6" },
    { id:15, title:"Tokyo Crossing",          cat:"City",         img:"https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=600", color:"#60a5fa" },
    { id:16, title:"Desert Dunes",            cat:"Nature",       img:"https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600", color:"#4ade80" },
    { id:17, title:"Cathedral Interior",      cat:"Architecture", img:"https://images.unsplash.com/photo-1555993539-1732b0258235?w=600", color:"#a78bfa" },
    { id:18, title:"Waves at Dusk",           cat:"Ocean",        img:"https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=800", color:"#38bdf8" },
  ];

  let currentFilter = 'all';
  let currentSort   = 'default';
  let lbIndex       = 0;
  let likes         = new Set();

  // ── Category counts ──
  function updateCounts() {
    const cats = ['Nature','City','Abstract','People','Architecture','Ocean'];
    document.getElementById('cnt-all').textContent = photos.length;
    cats.forEach(c => {
      const el = document.getElementById('cnt-' + c);
      if (el) el.textContent = photos.filter(p => p.cat === c).length;
    });
  }

  // ── Filtered + sorted list ──
  function getVisible() {
    let list = currentFilter === 'all' ? [...photos] : photos.filter(p => p.cat === currentFilter);
    if (currentSort === 'az') list.sort((a,b) => a.title.localeCompare(b.title));
    if (currentSort === 'za') list.sort((a,b) => b.title.localeCompare(a.title));
    return list;
  }

  // ── Render gallery ──
  function render() {
    const gallery = document.getElementById('gallery');
    const empty   = document.getElementById('emptyState');
    const visible = getVisible();

    document.getElementById('showCount').textContent = visible.length;

    if (!visible.length) {
      gallery.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    gallery.innerHTML = visible.map((p, i) => `
      <div class="card" data-id="${p.id}" onclick="openLb(${p.id})" style="animation-delay:${i * 0.04}s">
        <div class="cat-dot" style="background:${p.color}"></div>
        <img src="${p.img}" alt="${p.title}" loading="lazy"/>
        <div class="card-overlay">
          <div class="card-cat">${p.cat}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-actions">
            <button class="act-btn ${likes.has(p.id) ? 'liked' : ''}" onclick="toggleLike(event,${p.id})" title="Like">
              ${likes.has(p.id) ? '♥' : '♡'}
            </button>
            <button class="act-btn" onclick="openLb(${p.id})" title="Expand">⛶</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Filter ──
  function setFilter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Sort ──
  function sortGallery(val) {
    currentSort = val;
    render();
  }

  // ── Like toggle ──
  function toggleLike(e, id) {
    e.stopPropagation();
    if (likes.has(id)) likes.delete(id);
    else likes.add(id);
    render();
  }

  // ── Lightbox ──
  function openLb(id) {
    const visible = getVisible();
    lbIndex = visible.findIndex(p => p.id === id);
    showLb(visible[lbIndex]);
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLb(p) {
    document.getElementById('lbImg').src       = p.img.replace('w=600','w=1000');
    document.getElementById('lbTitle').textContent = p.title;
    document.getElementById('lbCat').textContent   = p.cat;
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    const visible = getVisible();
    lbIndex = (lbIndex + dir + visible.length) % visible.length;
    showLb(visible[lbIndex]);
  }

  function lbClickOutside(e) {
    if (e.target === document.getElementById('lightbox')) closeLb();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')      closeLb();
    if (e.key === 'ArrowRight')  lbNav(+1);
    if (e.key === 'ArrowLeft')   lbNav(-1);
  });

  // ── Init ──
  updateCounts();
  render();
</script>
</body>
</html>
