<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#fafafa;font-family:'Urbanist',sans-serif;min-height:100vh;padding:2rem;}
  header{text-align:center;margin-bottom:2.5rem;}
  header h1{font-size:2.4rem;font-weight:800;color:#111;}
  header p{color:#888;margin-top:.4rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem;}
  .card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px #0001;transition:transform .25s,box-shadow .25s;}
  .card:hover{transform:translateY(-6px);box-shadow:0 16px 40px #0002;}
  .card-img{position:relative;height:200px;background:linear-gradient(135deg,#f0f4ff,#fdf2f8);display:flex;align-items:center;justify-content:center;font-size:4rem;}
  .badge-cat{position:absolute;top:.7rem;left:.7rem;background:#111;color:#fff;font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:6px;text-transform:uppercase;}
  .card-body{padding:1.2rem;}
  .card-name{font-size:1rem;font-weight:700;color:#111;margin-bottom:.3rem;}
  .card-desc{font-size:.82rem;color:#888;margin-bottom:.9rem;line-height:1.5;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;}
  .price{font-size:1.3rem;font-weight:800;color:#111;}
  .price span{font-size:.8rem;color:#aaa;text-decoration:line-through;margin-right:.3rem;}
  .btn-buy{background:#111;color:#fff;border:none;padding:.5rem 1rem;border-radius:10px;font-family:'Urbanist',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-buy:hover{background:#6366f1;}
  .stars{color:#f59e0b;font-size:.8rem;margin-bottom:.5rem;}
  /* cart notification */
  .toast{position:fixed;bottom:2rem;right:2rem;background:#111;color:#fff;padding:.8rem 1.4rem;border-radius:12px;font-size:.9rem;font-weight:600;transform:translateY(100px);opacity:0;transition:all .4s;z-index:100;}
  .toast.show{transform:translateY(0);opacity:1;}
  .cart-count{position:fixed;top:1.5rem;right:1.5rem;background:#6366f1;color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;box-shadow:0 4px 15px #6366f140;}
</style>
</head>
<body>
<header><h1>🛍️ Product Gallery</h1><p>Explore our collection — click Buy Now to add to cart</p></header>
<div class="cart-count" id="cartCount">0</div>
<div class="grid" id="productGrid"></div>
<div class="toast" id="toast"></div>

<script>
const products=[
  {id:1,name:"Wireless Headphones",desc:"Premium audio with 30hr battery and ANC",price:2999,old:3999,emoji:"🎧",cat:"Electronics",stars:5},
  {id:2,name:"Leather Wallet",desc:"Slim genuine leather bi-fold wallet",price:799,old:1199,emoji:"👜",cat:"Accessories",stars:4},
  {id:3,name:"Running Shoes",desc:"Lightweight mesh shoes for daily runs",price:1999,old:2799,emoji:"👟",cat:"Footwear",stars:5},
  {id:4,name:"Smartwatch",desc:"Health tracking, GPS, 7-day battery",price:4999,old:6999,emoji:"⌚",cat:"Electronics",stars:4},
  {id:5,name:"Backpack",desc:"Waterproof 30L laptop backpack",price:1299,old:1799,emoji:"🎒",cat:"Bags",stars:4},
  {id:6,name:"Desk Lamp",desc:"LED lamp with adjustable color temperature",price:699,old:999,emoji:"💡",cat:"Home",stars:5},
  {id:7,name:"Water Bottle",desc:"Insulated stainless steel 1L bottle",price:599,old:799,emoji:"🥤",cat:"Sports",stars:4},
  {id:8,name:"Notebook Set",desc:"Premium dotted notebooks 3-pack",price:399,old:599,emoji:"📓",cat:"Stationery",stars:5},
];

let cartCount=0;

function render(){
  const grid=document.getElementById('productGrid');
  grid.innerHTML='';
  products.forEach(p=>{
    const stars='★'.repeat(p.stars)+'☆'.repeat(5-p.stars);
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-img">
        <span class="badge-cat">${p.cat}</span>
        <span>${p.emoji}</span>
      </div>
      <div class="card-body">
        <div class="stars">${stars}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="price"><span>₹${p.old}</span>₹${p.price}</div>
          <button class="btn-buy" onclick="buyNow('${p.name}')">Buy Now</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function buyNow(name){
  cartCount++;
  document.getElementById('cartCount').textContent=cartCount;
  const toast=document.getElementById('toast');
  toast.textContent=`✅ "${name}" added to cart!`;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
