<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Profile Previewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#f1f5f9;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:960px;width:100%;}
  @media(max-width:700px){.layout{grid-template-columns:1fr;}}
  .panel{background:white;border-radius:20px;padding:2rem;box-shadow:0 4px 20px #0002;}
  h2{font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;color:#1e293b;}
  .field{margin-bottom:1.2rem;}
  label{display:block;font-size:.82rem;font-weight:600;color:#64748b;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em;}
  input,textarea,select{width:100%;padding:.65rem .9rem;border:2px solid #e2e8f0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.93rem;color:#1e293b;outline:none;transition:border .2s;background:#f8fafc;}
  input:focus,textarea:focus,select:focus{border-color:#6366f1;background:white;}
  textarea{resize:vertical;min-height:80px;}
  /* PROFILE CARD */
  .profile-card{background:linear-gradient(160deg,#1e1b4b,#312e81);border-radius:20px;overflow:hidden;color:white;box-shadow:0 20px 60px #312e8140;}
  .card-banner{height:100px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);position:relative;}
  .avatar-wrap{position:absolute;bottom:-36px;left:1.5rem;}
  .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;border:4px solid #1e1b4b;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .card-body{padding:3rem 1.5rem 1.5rem;}
  .card-name{font-size:1.4rem;font-weight:700;}
  .card-title{font-size:.88rem;color:#a5b4fc;margin-bottom:.8rem;}
  .card-bio{font-size:.85rem;color:#c7d2fe;line-height:1.6;margin-bottom:1rem;min-height:2.5rem;}
  .card-info{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
  .info-chip{background:#ffffff18;padding:.25rem .7rem;border-radius:99px;font-size:.78rem;color:#e0e7ff;}
  .card-skills{display:flex;flex-wrap:wrap;gap:.4rem;}
  .skill-tag{background:#6366f120;border:1px solid #6366f150;padding:.2rem .6rem;border-radius:6px;font-size:.75rem;color:#a5b4fc;}
</style>
</head>
<body>
<div class="layout">
  <div class="panel">
    <h2>✏️ Edit Profile</h2>
    <div class="field"><label>Full Name</label><input id="name" type="text" placeholder="John Doe" oninput="update()"></div>
    <div class="field"><label>Job Title</label><input id="title" type="text" placeholder="Full Stack Developer" oninput="update()"></div>
    <div class="field"><label>Location</label><input id="location" type="text" placeholder="Mumbai, India" oninput="update()"></div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="john@example.com" oninput="update()"></div>
    <div class="field"><label>Bio</label><textarea id="bio" placeholder="A short bio about yourself..." oninput="update()"></textarea></div>
    <div class="field"><label>Skills (comma separated)</label><input id="skills" type="text" placeholder="HTML, CSS, JavaScript" oninput="update()"></div>
    <div class="field"><label>Avatar URL (optional)</label><input id="avatar" type="text" placeholder="https://..." oninput="update()"></div>
  </div>
  <div class="panel" style="padding:0;background:transparent;box-shadow:none;">
    <h2 style="padding:0 0 1rem;color:#1e293b;">👁️ Live Preview</h2>
    <div class="profile-card">
      <div class="card-banner"></div>
      <div class="avatar-wrap">
        <div class="avatar" id="previewAvatar">👤</div>
      </div>
      <div class="card-body">
        <div class="card-name" id="previewName">Your Name</div>
        <div class="card-title" id="previewTitle">Job Title</div>
        <div class="card-bio" id="previewBio">Your bio will appear here...</div>
        <div class="card-info" id="previewInfo"></div>
        <div class="card-skills" id="previewSkills"></div>
      </div>
    </div>
  </div>
</div>
<script>
function update(){
  const name=document.getElementById('name').value||'Your Name';
  const title=document.getElementById('title').value||'Job Title';
  const bio=document.getElementById('bio').value||'Your bio will appear here...';
  const location=document.getElementById('location').value;
  const email=document.getElementById('email').value;
  const skills=document.getElementById('skills').value;
  const avatarUrl=document.getElementById('avatar').value.trim();

  document.getElementById('previewName').textContent=name;
  document.getElementById('previewTitle').textContent=title;
  document.getElementById('previewBio').textContent=bio;

  const infoEl=document.getElementById('previewInfo');
  infoEl.innerHTML='';
  if(location) infoEl.innerHTML+=`<span class="info-chip">📍 ${location}</span>`;
  if(email) infoEl.innerHTML+=`<span class="info-chip">📧 ${email}</span>`;

  const skillsEl=document.getElementById('previewSkills');
  skillsEl.innerHTML='';
  if(skills) skills.split(',').forEach(s=>{
    if(s.trim()) skillsEl.innerHTML+=`<span class="skill-tag">${s.trim()}</span>`;
  });

  const avatarEl=document.getElementById('previewAvatar');
  if(avatarUrl){
    avatarEl.innerHTML=`<img src="${avatarUrl}" onerror="this.parentElement.innerHTML='👤'">`;
  } else {
    avatarEl.innerHTML=name.charAt(0).toUpperCase()||'👤';
  }
}
// set defaults
document.getElementById('name').value='Rohan Sharma';
document.getElementById('title').value='Full Stack Developer';
document.getElementById('location').value='Pune, India';
document.getElementById('email').value='rohan@example.com';
document.getElementById('bio').value='Passionate developer who loves building beautiful web apps with modern technologies.';
document.getElementById('skills').value='HTML, CSS, JavaScript, Node.js, MongoDB';
update();
</script>
</body>
</html>
